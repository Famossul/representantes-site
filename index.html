<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contatos</title>

<style>

:root{
--cor-fundo:#e4e4e4;
--cor-caixa:#ffffff;
--cor-texto:#000;
--cor-borda:#11b611a4;
}

body{
margin:0;
font-family:Segoe UI,Roboto,Arial;
background:var(--cor-fundo);
}

header{
background:white;
padding:10px;
text-align:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

header img{
max-width:180px;
}

.container{
width:92%;
max-width:520px;
margin:auto;
margin-top:15px;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

h1{
text-align:center;
font-size:1.4rem;
margin-bottom:20px;
}

label{
font-weight:600;
display:block;
margin-top:12px;
}

select,input{
width:100%;
padding:12px;
margin-top:5px;
border-radius:8px;
border:1px solid var(--cor-borda);
font-size:15px;
box-sizing:border-box;
}

.representante{
margin-top:15px;
padding:15px;
border-radius:10px;
background:#f9fbfd;
border:1px solid var(--cor-borda);
}

.representante span{
display:block;
margin-top:5px;
}

.representante a{
text-decoration:none;
color:black;
}

.whats{
display:flex;
align-items:center;
gap:6px;
}

.whats img{
width:20px;
}

#cidadeLista{
max-height:180px;
overflow-y:auto;
border:1px solid #ddd;
border-radius:8px;
display:none;
margin-top:5px;
background:white;
}

.cidade-item{
padding:10px;
cursor:pointer;
}

.cidade-item:hover{
background:#f2f2f2;
}

#btn-flutuante{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:#11b611;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,.3);
}

#btn-flutuante img{
width:32px;
}

</style>
</head>

<body>

<header>
<a href="https://famossul.com.br/" target="_blank">
<img src="famossul-branco.png">
</a>
</header>

<main class="container">

<h1>Nossos canais de atendimento</h1>

<label>Área</label>
<select id="area">
<option value="">Selecione</option>
<option value="logistica">Logística</option>
<option value="rastreio">Rastreio</option>
<option value="sac">SAC</option>
<option value="comercial">Comercial</option>
</select>

<div id="subarea-box" style="display:none">

<label>Produto</label>
<select id="subarea">
<option value="">Selecione</option>
<option value="portas">Portas e Componentes (Residencial/Laqueatto)</option>
<option value="forro">Forro Vinílico (Tetto Revest)</option>
</select>

</div>

<div id="regiao-box" style="display:none">

<label>Região</label>
<select id="regiao">
<option value="">Selecione</option>
</select>

<label>Estado</label>
<select id="estado">
<option value="">Selecione</option>
</select>

<div id="cidade-box" style="display:none">

<label>Cidade</label>
<input type="text" id="cidadeBusca" placeholder="Digite a cidade">

<div id="cidadeLista"></div>

</div>

</div>

<div id="contato"></div>

</main>

<a href="https://wa.me/5541995030522" target="_blank" id="btn-flutuante">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</a>

<script>

const area = document.getElementById("area")
const subarea = document.getElementById("subarea")
const regiao = document.getElementById("regiao")
const estado = document.getElementById("estado")
const cidadeBusca = document.getElementById("cidadeBusca")

const subareaBox = document.getElementById("subarea-box")
const regiaoBox = document.getElementById("regiao-box")
const cidadeBox = document.getElementById("cidade-box")

const cidadeLista = document.getElementById("cidadeLista")
const contato = document.getElementById("contato")

let listaCidades=[]

let dados={
logistica:[
{nome:"Luan",telefone:"(47)9998-9145",email:"logistica@famossul.com.br"},
{nome:"Mayron",telefone:"(41)98813-9380",email:"logistica1@famossul.com.br"}
],
rastreio:[
{nome:"Graziela",telefone:"(41)99503-0522",email:"entregas@famossul.com.br"}
],
sac:[
{nome:"Carlos/Maurici",telefone:"(41)98895-7643",email:"tecnico@famossul.com.br"}
],
comercial:{
portas:{},
forro:[
{nome:"Tetto Revest",telefone:"(41)98727-9981",email:"vendas1@tettorevest.com.br"}
]
}
}

fetch("representantes.json")
.then(r=>r.json())
.then(json=>{

dados.comercial.portas=json

Object.keys(json).sort().forEach(r=>{
let o=document.createElement("option")
o.value=r
o.textContent=r
regiao.appendChild(o)
})

})

area.addEventListener("change",()=>{

contato.innerHTML=""

if(area.value==="comercial")
subareaBox.style.display="block"
else{
subareaBox.style.display="none"
regiaoBox.style.display="none"
mostrarContato()
}

})

subarea.addEventListener("change",()=>{

contato.innerHTML=""

if(subarea.value==="portas")
regiaoBox.style.display="block"
else{
regiaoBox.style.display="none"
mostrarContato()
}

})

regiao.addEventListener("change",()=>{

estado.innerHTML='<option value="">Selecione</option>'

let r=regiao.value

if(!r)return

Object.keys(dados.comercial.portas[r]).forEach(e=>{
let o=document.createElement("option")
o.value=e
o.textContent=e
estado.appendChild(o)
})

})

estado.addEventListener("change",()=>{

cidadeBox.style.display="block"

let r=regiao.value
let e=estado.value

listaCidades=Object.keys(dados.comercial.portas[r][e]).sort()

mostrarLista(listaCidades)

})

cidadeBusca.addEventListener("input",()=>{

let filtro=cidadeBusca.value.toLowerCase()

let filtradas=listaCidades.filter(c=>c.toLowerCase().includes(filtro))

mostrarLista(filtradas)

})

function mostrarLista(lista){

cidadeLista.innerHTML=""

lista.forEach(c=>{

let div=document.createElement("div")
div.className="cidade-item"
div.textContent=c

div.onclick=()=>{

cidadeBusca.value=c
cidadeLista.style.display="none"

mostrarContato()

}

cidadeLista.appendChild(div)

})

cidadeLista.style.display="block"

}

function mostrarContato(){

contato.innerHTML=""

if(area.value!=="comercial"){

dados[area.value].forEach(r=>{
contato.innerHTML+=card(r)
})

return
}

if(subarea.value==="forro"){

dados.comercial.forro.forEach(r=>{
contato.innerHTML+=card(r)
})

return
}

let r=regiao.value
let e=estado.value
let c=cidadeBusca.value

if(!r||!e||!c)return

let reps=dados.comercial.portas[r][e][c]

if(!reps){
contato.innerHTML="<p>Cidade não encontrada</p>"
return
}

reps.forEach(rep=>{
contato.innerHTML+=card(rep)
})

}

function card(rep){

let numero=rep.telefone.replace(/\D/g,"")

return `

<div class="representante">

<strong>${rep.nome}</strong>

<span class="whats">
<a href="https://wa.me/55${numero}" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
${rep.telefone}
</a>
</span>

${rep.email?`<span>📧 <a href="mailto:${rep.email}">${rep.email}</a></span>`:""}

</div>

`

}

</script>

</body>
</html>
